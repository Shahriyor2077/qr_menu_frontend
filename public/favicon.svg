<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Orange background -->
  <rect width="32" height="32" rx="7" fill="#f97316"/>

  <!-- Top-left finder pattern -->
  <rect x="4" y="4" width="9" height="9" fill="white"/>
  <rect x="6" y="6" width="5" height="5" fill="#f97316"/>
  <rect x="7" y="7" width="3" height="3" fill="white"/>

  <!-- Top-right finder pattern -->
  <rect x="19" y="4" width="9" height="9" fill="white"/>
  <rect x="21" y="6" width="5" height="5" fill="#f97316"/>
  <rect x="22" y="7" width="3" height="3" fill="white"/>

  <!-- Bottom-left finder pattern -->
  <rect x="4" y="19" width="9" height="9" fill="white"/>
  <rect x="6" y="21" width="5" height="5" fill="#f97316"/>
  <rect x="7" y="22" width="3" height="3" fill="white"/>

  <!-- Data modules (bottom-right) -->
  <rect x="19" y="19" width="4" height="4" rx="0.5" fill="white"/>
  <rect x="24" y="19" width="4" height="4" rx="0.5" fill="white"/>
  <rect x="19" y="24" width="4" height="4" rx="0.5" fill="white"/>
  <rect x="24" y="24" width="4" height="4" rx="0.5" fill="white"/>
  <rect x="19" y="14" width="2" height="2" fill="white"/>
  <rect x="22" y="14" width="2" height="2" fill="white"/>
  <rect x="25" y="14" width="2" height="2" fill="white"/>
  <rect x="14" y="19" width="2" height="2" fill="white"/>
  <rect x="14" y="22" width="2" height="2" fill="white"/>
  <rect x="14" y="25" width="2" height="2" fill="white"/>
  <rect x="14" y="14" width="2" height="2" fill="white"/>
</svg>
